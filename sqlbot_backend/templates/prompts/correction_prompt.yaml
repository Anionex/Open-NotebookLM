# SQL修正提示词模板 - 参考SQLBot的regenerate设计

# 修正提示头部
header: |
  【SQL修正 - 第一次且仅有一次修正机会】
  
  上一次SQL出错了，这是你最后一次修正机会。修正失败就放弃了。

# 数据源提醒
datasource_reminder: |
  【数据源ID】
  ⚠️ 重要：在所有工具调用中必须使用 datasource_id={datasource_id}

# 错误信息模板
error_info: |
  ### 失败的原因
  {error_message}
  
  ### 失败的SQL
  ```sql
  {failed_sql}
  ```

# 修正指南
correction_guide: |
  【立即修正 - 不要做任何其他操作】
  1. 只修正SQL，不要调用 get_datasource_schema（你已经知道数据结构了）
  2. 根据错误信息，识别出具体问题列名或SQL语法
  3. 直接修正SQL，保证:
     ✓ 所有列别名都是英文
     ✓ 列名符合规范（总销售额→total_amount, 订单数→count）
     ✓ SQL语法正确
     ✓ 聚合列都在GROUP BY中
     ✓ 包含LIMIT子句限制返回行数
  4. 调用 execute_sql(datasource_id={datasource_id}, sql="修正后的SQL") 重新执行

# 严禁事项
prohibitions: |
  【严禁】
  - 再调用 get_datasource_schema
  - 使用错误的datasource_id
  - 修正后还有其他列名问题
  - 添加你没有被要求的列
  - 调用任何其他工具

# 结束提示
ending: |
  立即执行修正：确保修正的SQL只修正错误部分，其他部分保持不变。使用正确的datasource_id={datasource_id}。









