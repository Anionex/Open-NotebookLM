# 错误消息模板 - 参考SQLBot的结构化错误消息设计

# SQL验证错误
sql_validation:
  non_english_columns: |
    SQL列别名包含非英文字符: {columns}。
    请修正SQL，确保所有列别名都是英文。例如：
    - 错误: SELECT city AS 城市, SUM(total_amount) AS 总销售额
    - 正确: SELECT city AS city, SUM(total_amount) AS total_amount
    必须将所有列别名改为有意义的英文单词！

  non_standard_columns: |
    SQL使用了不规范的列名，请修正为标准名称：
    {fixes}
    
    标准化列名规则：
    - SUM(total_amount) → 必须用 AS total_amount（而非 total_sales）
    - COUNT(*) → 必须用 AS count（而非 order_count, cnt）
    - source列 → 必须用 AS source（而非 customer_source）
    
    请重新生成SQL，使用标准列名。

  missing_limit: |
    SQL中缺少LIMIT子句。为了防止数据量过大，所有SELECT都必须包含LIMIT限制。
    请添加'LIMIT 1000'或其他合适的限制。

  syntax_error: |
    SQL语法错误：{error}
    请检查SQL语法是否正确。

  dangerous_operation: |
    禁止使用{operation}操作。
    只允许SELECT查询语句。

# 执行错误
execution:
  table_not_found: |
    表'{table_name}'不存在于数据源中。
    可用的表: {available_tables}

  column_not_found: |
    列'{column_name}'不存在。
    请使用 get_datasource_schema 查看可用的列。

  general_error: |
    SQL执行失败: {error}
    请检查SQL语法和数据类型是否正确。

# 系统错误
system:
  max_retries: |
    已超过最大重试次数({max_retries})，放弃执行。

  datasource_not_found: |
    数据源 {datasource_id} 未找到。请先上传数据文件。

  timeout: |
    查询超时，请尝试添加更多过滤条件或减少返回数据量。









