# DuckDB SQL生成规则（参考SQLBot设计）

database_engine: "DuckDB"
example_engine: "DuckDB 0.10"
quote_char: '"'  # DuckDB使用双引号

# 引号规则（参考SQLBot的quot_rule）
quot_rule: |
  <rule priority="high">
    DuckDB支持双引号(")标识列名和表名
    示例: SELECT "user_id", "user_name" FROM "users"
    建议: 通常不需要引号，除非列名包含特殊字符或空格
    注意: DuckDB默认对标识符大小写不敏感
  </rule>

# LIMIT规则（参考SQLBot的limit_rule）
limit_rule: |
  <rule priority="critical">
    DuckDB使用LIMIT语法限制返回行数
    语法: SELECT ... FROM ... LIMIT n
    分页: SELECT ... FROM ... LIMIT n OFFSET m
    ⚠️ 所有SELECT必须包含LIMIT限制（默认1000）
    ⚠️ 不支持TOP或FETCH FIRST语法
  </rule>

# 日期格式化规则（参考SQLBot的date_format_rule）
date_format_rule: |
  <rule>
    日期格式化使用strftime函数：
    - 年月日: strftime(date_column, '%Y-%m-%d')
    - 年月: strftime(date_column, '%Y-%m')
    - 年份: strftime(date_column, '%Y')
    日期部分提取使用EXTRACT：
    - 年份: EXTRACT(YEAR FROM date_column)
    - 月份: EXTRACT(MONTH FROM date_column)
    - 日: EXTRACT(DAY FROM date_column)
  </rule>

# NULL处理规则
null_handling_rule: |
  <rule>
    NULL值处理使用COALESCE函数：
    - COALESCE(source, 'empty') AS source
    - COALESCE(amount, 0) AS amount
    ⚠️ 替换值必须使用英文字符串，不能用中文
  </rule>

# 聚合列别名规则
aggregation_rule: |
  <rule priority="critical">
    聚合函数列别名规范（必须严格遵守）：
    - SUM(total_amount) AS total_amount (不是total_sales)
    - COUNT(*) AS count (不是order_count)
    - AVG(amount) AS avg_amount
    - MAX/MIN保持原字段名
    ⚠️ 不要添加用户未要求的额外统计列
  </rule>

reserved_keywords:
  - "select"
  - "from"
  - "where"
  - "group by"
  - "order by"
  - "limit"
  - "offset"
  - "join"
  - "inner"
  - "left"
  - "right"
  - "full"
  - "cross"

# 数据类型映射
data_type_mappings:
  integer: "INTEGER"
  int: "INTEGER"
  bigint: "BIGINT"
  varchar: "VARCHAR"
  text: "TEXT"
  date: "DATE"
  timestamp: "TIMESTAMP"
  decimal: "DECIMAL"
  numeric: "NUMERIC"
  float: "FLOAT"
  double: "DOUBLE"
  boolean: "BOOLEAN"

# DuckDB特定函数映射
function_mappings:
  year: "EXTRACT(YEAR FROM {column})"
  month: "EXTRACT(MONTH FROM {column})"
  day: "EXTRACT(DAY FROM {column})"
  now: "CURRENT_TIMESTAMP"
  length: "LENGTH({column})"
  trim: "TRIM({column})"
  upper: "UPPER({column})"
  lower: "LOWER({column})"

# DuckDB特定的Few-shot示例
examples:
  - question: "统计各城市的总销售额"
    sql: |
      SELECT
          city,
          SUM(total_amount) AS total_amount
      FROM sales_benchmark
      GROUP BY city
      ORDER BY total_amount DESC
    explanation: "使用SUM进行聚合，GROUP BY城市维度"

  - question: "计算2024年的订单数"
    sql: |
      SELECT
          COUNT(*) AS count
      FROM sales_benchmark
      WHERE EXTRACT(YEAR FROM date) = 2024
    explanation: "DuckDB中使用EXTRACT函数进行日期提取，必须使用英文别名count"

  - question: "统计各来源的订单，包括NULL值"
    sql: |
      SELECT
          COALESCE(source, 'empty') AS source,
          COUNT(*) AS count
      FROM sales_benchmark
      GROUP BY source
      ORDER BY count DESC
    explanation: "COALESCE处理NULL值，将NULL转换为'empty'（英文）"

  - question: "查找包含特定关键词的行"
    sql: |
      SELECT *
      FROM sales_benchmark
      WHERE remark LIKE '%加急%' OR remark LIKE '%包装%'
    explanation: "DuckDB支持LIKE进行模糊匹配，支持中文字符串"

# DuckDB特定的限制和约束
constraints:
  - name: "null_handling"
    description: "NULL值处理：使用COALESCE或IS NULL判断"

  - name: "string_literal"
    description: "字符串使用单引号'quoted'，不是双引号"

  - name: "case_insensitive"
    description: "列名和表名对大小写不敏感（DuckDB特性）"

  - name: "function_case"
    description: "SQL函数不区分大小写（COUNT, count都可以）"

# 性能提示
performance_tips:
  - "使用LIMIT限制返回行数，避免大量数据传输"
  - "在大表上的WHERE条件应该使用索引列"
  - "GROUP BY应该在WHERE之后，以减少分组的行数"
  - "对于大数据量，使用聚合函数而不是子查询"
