# MySQL SQL生成规则（参考SQLBot设计）

database_engine: "MySQL"
example_engine: "MySQL 8.0"
quote_char: '`'  # MySQL使用反引号

# 引号规则（参考SQLBot的quot_rule）
quot_rule: |
  <rule priority="high">
    MySQL使用反引号(`)标识列名和表名
    示例: SELECT `user_id`, `user_name` FROM `users`
    注意: MySQL标识符默认不区分大小写
    建议: 避免使用MySQL保留字作为列名
  </rule>

# LIMIT规则（参考SQLBot的limit_rule）
limit_rule: |
  <rule priority="critical">
    MySQL使用LIMIT语法
    语法: SELECT ... FROM ... LIMIT n
    分页: SELECT ... FROM ... LIMIT offset, count
    或者: SELECT ... FROM ... LIMIT count OFFSET offset
    ⚠️ 所有SELECT必须包含LIMIT限制（默认1000）
    ⚠️ 不支持TOP语法（SQL Server风格）
  </rule>

# 日期格式化规则（参考SQLBot的date_format_rule）
date_format_rule: |
  <rule>
    日期格式化使用DATE_FORMAT函数：
    - 年月日: DATE_FORMAT(date_column, '%Y-%m-%d')
    - 年月: DATE_FORMAT(date_column, '%Y-%m')
    - 年份: DATE_FORMAT(date_column, '%Y')
    日期部分提取使用函数：
    - 年份: YEAR(date_column)
    - 月份: MONTH(date_column)
    - 日: DAY(date_column)
  </rule>

# NULL处理规则
null_handling_rule: |
  <rule>
    NULL值处理推荐使用IFNULL或COALESCE函数：
    - IFNULL(source, 'empty') AS source (MySQL专用，更简洁)
    - COALESCE(source, 'empty') AS source (SQL标准，兼容性好)
    ⚠️ 替换值必须使用英文字符串，不能用中文
  </rule>

reserved_keywords:
  - "select"
  - "from"
  - "where"
  - "group by"
  - "order by"
  - "limit"
  - "offset"
  - "join"
  - "inner"
  - "left"
  - "right"
  - "cross"
  - "union"
  - "distinct"

# 数据类型映射
data_type_mappings:
  integer: "INT"
  int: "INT"
  bigint: "BIGINT"
  varchar: "VARCHAR"
  text: "TEXT"
  date: "DATE"
  datetime: "DATETIME"
  timestamp: "TIMESTAMP"
  decimal: "DECIMAL"
  numeric: "NUMERIC"
  float: "FLOAT"
  double: "DOUBLE"
  boolean: "BOOLEAN"
  tinyint: "TINYINT"
  smallint: "SMALLINT"

# MySQL特定函数映射
function_mappings:
  year: "YEAR({column})"
  month: "MONTH({column})"
  day: "DAY({column})"
  now: "NOW()"
  length: "LENGTH({column})"
  trim: "TRIM({column})"
  upper: "UPPER({column})"
  lower: "LOWER({column})"
  date_format: "DATE_FORMAT({column}, {format})"

# MySQL特定的Few-shot示例
examples:
  - question: "统计各城市的总销售额"
    sql: |
      SELECT
          city,
          SUM(total_amount) AS total_amount
      FROM sales_benchmark
      GROUP BY city
      ORDER BY total_amount DESC
      LIMIT 10
    explanation: "MySQL中使用SUM进行聚合，LIMIT限制返回行数"

  - question: "计算2024年的订单数"
    sql: |
      SELECT
          COUNT(*) AS count
      FROM sales_benchmark
      WHERE YEAR(date) = 2024
    explanation: "MySQL中使用YEAR()函数提取年份，比EXTRACT更简洁"

  - question: "统计各来源的订单，包括NULL值"
    sql: |
      SELECT
          IFNULL(source, 'empty') AS source,
          COUNT(*) AS count
      FROM sales_benchmark
      GROUP BY source
      ORDER BY count DESC
    explanation: "MySQL中使用IFNULL处理NULL值（类似COALESCE但更简洁）"

  - question: "查找包含特定关键词的行"
    sql: |
      SELECT *
      FROM sales_benchmark
      WHERE remark LIKE '%加急%' OR remark LIKE '%包装%'
      LIMIT 1000
    explanation: "MySQL支持LIKE进行模糊匹配，必须指定LIMIT"

# MySQL特定的限制和约束
constraints:
  - name: "null_handling"
    description: "NULL值处理：使用IFNULL()或COALESCE()，推荐IFNULL"

  - name: "string_literal"
    description: "字符串使用单引号'quoted'，不是双引号"

  - name: "case_sensitivity"
    description: "MySQL列名默认不区分大小写，表名与操作系统相关"

  - name: "function_case"
    description: "SQL函数不区分大小写（COUNT, count都可以）"

  - name: "group_concat"
    description: "MySQL提供GROUP_CONCAT()用于字符串聚合，但要设置max_allowed_packet"

# 性能提示
performance_tips:
  - "对于大表查询，务必使用WHERE进行过滤再GROUP BY"
  - "在WHERE条件中使用的列应该有索引"
  - "避免在JOIN中使用子查询，改用临时表或视图"
  - "使用EXPLAIN分析查询性能"
  - "GROUP BY的列顺序影响性能，把低基数列放在前面"
  - "对于COUNT(DISTINCT)操作，大数据量时性能较差"

# MySQL版本相关
version_specific:
  mysql_5_7: "不支持JSON_TABLE，窗口函数需要升级到8.0"
  mysql_8_0: "完整支持窗口函数、JSON函数、CTE等现代SQL特性"
