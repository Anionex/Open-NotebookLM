# PostgreSQL SQL生成规则（参考SQLBot设计）

database_engine: "PostgreSQL"
example_engine: "PostgreSQL 14"
quote_char: '"'  # PostgreSQL使用双引号

# 引号规则（参考SQLBot的quot_rule）
quot_rule: |
  <rule priority="high">
    PostgreSQL使用双引号(")标识列名和表名
    示例: SELECT "user_id", "user_name" FROM "users"
    注意: 双引号内的标识符保持大小写敏感
    建议: 非必要时避免使用双引号，使用小写标识符
  </rule>

# LIMIT规则（参考SQLBot的limit_rule）
limit_rule: |
  <rule priority="critical">
    PostgreSQL使用LIMIT...OFFSET语法
    语法: SELECT ... FROM ... LIMIT n OFFSET m
    简化: SELECT ... FROM ... LIMIT n
    ⚠️ 所有SELECT必须包含LIMIT限制（默认1000）
    ⚠️ 不支持TOP或FETCH FIRST语法（SQL Server风格）
  </rule>

# 日期格式化规则（参考SQLBot的date_format_rule）
date_format_rule: |
  <rule>
    日期格式化使用TO_CHAR函数：
    - 年月日: TO_CHAR(date_column, 'YYYY-MM-DD')
    - 年月: TO_CHAR(date_column, 'YYYY-MM')
    - 年份: TO_CHAR(date_column, 'YYYY')
    日期部分提取使用EXTRACT：
    - 年份: EXTRACT(YEAR FROM date_column)
    - 月份: EXTRACT(MONTH FROM date_column)
    - 日: EXTRACT(DAY FROM date_column)
  </rule>

# NULL处理规则
null_handling_rule: |
  <rule>
    NULL值处理推荐使用COALESCE函数：
    - COALESCE(source, 'empty') AS source
    - COALESCE(amount, 0) AS amount
    ⚠️ 替换值必须使用英文字符串，不能用中文
  </rule>

reserved_keywords:
  - "select"
  - "from"
  - "where"
  - "group by"
  - "order by"
  - "limit"
  - "offset"
  - "join"
  - "inner"
  - "left"
  - "right"
  - "cross"
  - "full outer"
  - "lateral"

# 数据类型映射
data_type_mappings:
  integer: "INTEGER"
  int: "INTEGER"
  bigint: "BIGINT"
  smallint: "SMALLINT"
  varchar: "VARCHAR"
  char: "CHAR"
  text: "TEXT"
  date: "DATE"
  timestamp: "TIMESTAMP"
  timestamptz: "TIMESTAMP WITH TIME ZONE"
  numeric: "NUMERIC"
  decimal: "DECIMAL"
  float: "FLOAT"
  double: "DOUBLE PRECISION"
  boolean: "BOOLEAN"
  jsonb: "JSONB"
  json: "JSON"
  array: "ARRAY"
  uuid: "UUID"

# PostgreSQL特定函数映射
function_mappings:
  year: "EXTRACT(YEAR FROM {column})"
  month: "EXTRACT(MONTH FROM {column})"
  day: "EXTRACT(DAY FROM {column})"
  now: "CURRENT_TIMESTAMP"
  length: "LENGTH({column})"
  trim: "TRIM({column})"
  upper: "UPPER({column})"
  lower: "LOWER({column})"
  to_char: "TO_CHAR({column}, {format})"

# PostgreSQL特定的Few-shot示例
examples:
  - question: "统计各城市的总销售额"
    sql: |
      SELECT
          city,
          SUM(total_amount) AS total_amount
      FROM sales_benchmark
      GROUP BY city
      ORDER BY total_amount DESC
      LIMIT 10
    explanation: "PostgreSQL中使用SUM进行聚合，GROUP BY必须包含所有非聚合列"

  - question: "计算2024年的订单数"
    sql: |
      SELECT
          COUNT(*) AS count
      FROM sales_benchmark
      WHERE EXTRACT(YEAR FROM date) = 2024
    explanation: "PostgreSQL使用EXTRACT函数提取日期部分"

  - question: "统计各来源的订单，包括NULL值"
    sql: |
      SELECT
          COALESCE(source, 'empty') AS source,
          COUNT(*) AS count
      FROM sales_benchmark
      GROUP BY source
      ORDER BY count DESC
    explanation: "PostgreSQL推荐使用COALESCE处理NULL值"

  - question: "查找包含特定关键词的行"
    sql: |
      SELECT *
      FROM sales_benchmark
      WHERE remark LIKE '%加急%' OR remark LIKE '%包装%'
      LIMIT 1000
    explanation: "PostgreSQL支持LIKE和ILIKE（不区分大小写）进行模糊匹配"

  - question: "使用窗口函数获取排名"
    sql: |
      SELECT
          product_name,
          total_amount,
          ROW_NUMBER() OVER (ORDER BY total_amount DESC) AS rank
      FROM sales_benchmark
      LIMIT 10
    explanation: "PostgreSQL完整支持窗口函数，用于排名和分析"

# PostgreSQL特定的限制和约束
constraints:
  - name: "null_handling"
    description: "NULL值处理：使用COALESCE或IS NULL"

  - name: "string_literal"
    description: "字符串使用单引号'quoted'，双引号用于标识符"

  - name: "case_sensitivity"
    description: "PostgreSQL列名默认转小写，如需保留大小写需要双引号"

  - name: "function_case"
    description: "SQL函数不区分大小写"

  - name: "array_operations"
    description: "PostgreSQL原生支持数组类型和操作"

  - name: "jsonb_support"
    description: "PostgreSQL支持JSONB类型，性能比JSON更好"

  - name: "cte"
    description: "完整支持WITH子句（CTE），用于递归查询和复杂逻辑"

# 性能提示
performance_tips:
  - "使用EXPLAIN ANALYZE查看查询执行计划"
  - "对WHERE条件中的列创建索引"
  - "对于GROUP BY操作，考虑使用PARTIAL INDEX"
  - "使用VACUUM和ANALYZE保持表统计信息更新"
  - "窗口函数性能优于自联接，优先使用窗口函数"
  - "对于大表的DISTINCT操作，考虑使用GROUP BY替代"
  - "使用LIMIT和OFFSET时，可以使用keyset pagination优化性能"

# PostgreSQL版本相关
version_specific:
  pg_9_6: "支持并行查询、更好的窗口函数性能"
  pg_10: "支持分区表、逻辑复制"
  pg_12: "支持生成列、增强的优化器"
  pg_14: "支持SQL/JSON标准、性能优化"

# 特殊功能
advanced_features:
  - "完整的ACID事务支持"
  - "原生JSON/JSONB支持"
  - "全文搜索引擎"
  - "PostGIS地理数据支持"
  - "递归CTE支持"
  - "窗口函数和分析函数"
